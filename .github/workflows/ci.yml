name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          # CPU torch wheel keeps the install lean for CI
          pip install --index-url https://download.pytorch.org/whl/cpu torch
          pip install -r requirements.txt

      - name: Run environment check
        run: python -m smartgrid_mas.check_environment

      - name: Run security guard tests
        run: pytest smartgrid_mas/tests/test_security_guard.py -v

  frontend-typecheck:
    name: Frontend (tsc --noEmit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install Node deps
        working-directory: web
        run: npm ci

      - name: Type-check
        working-directory: web
        # Allow the pre-existing tests/local-full-fresh.spec.ts missing-module
        # error to fail the job — flag, don't ignore. Remove `|| true` once fixed.
        run: npx tsc --noEmit
